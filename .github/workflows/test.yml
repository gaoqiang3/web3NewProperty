name: MyFirstAudit  # 任务的名字

on: [push] # 触发条件：只要我执行 git push，任务就开始

jobs:
  run-tests:
    runs-on: ubuntu-latest # 在 GitHub 提供的 Linux 电脑上运行
    
    steps:
      - uses: actions/checkout@v4 # 第一步：把我的代码复制到这台云端电脑上

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1 # 第二步：帮我装好 Forge 等工具

      - name: Set up Python
        uses: actions/setup-python@v4 # 第三步：帮我装好 Python
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install web3 # 第四步：装好你脚本需要的库

      - name: Run Audit
        run: forge test --ffi # 最后一步：正式开跑！
